app_name: nyctaxi
project_type: usecase
region: europe-west9
bigquery_location: EU
github_repo: simbabn/demo-dataform-nyc-taxy
git_commitish: main

# Set this to false when no SSH private key has been added as a Secret Manager
# secret version. The Terraform module still creates a usable Dataform repository.
dataform_enable_git_remote: true

enabled_services:
  - bigquery.googleapis.com
  - bigquerydatatransfer.googleapis.com
  - cloudscheduler.googleapis.com
  - run.googleapis.com
  - dataform.googleapis.com
  - iam.googleapis.com
  - iamcredentials.googleapis.com
  - secretmanager.googleapis.com
  - serviceusage.googleapis.com
  - storage.googleapis.com
  - workflows.googleapis.com

# Optional ODP/Limagrain integration fields.
# Keep them empty until this project uses GitHub Actions Workload Identity,
# Power BI workforce identity, central monitoring, Eventarc, resource tags,
# or the internal group management API.
workload_identity_pool:
powerbi_workforce_pool:
monitoring_topic:
tags_project:
core_event_bus:
apis: {}
